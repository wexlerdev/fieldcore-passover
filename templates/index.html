<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldCore — Sensor Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="dashboard">

        <!-- Time-range bar -->
        <div class="time-bar">
            {% for label in time_ranges %}
            <button class="time-btn{{ ' active' if loop.first }}" data-range="{{ label }}">{{ label }}</button>
            {% endfor %}
        </div>

        <!-- Two-column body -->
        <div class="body-columns">

            <!-- Left: Sensor Map -->
            <div class="col-map">
                <div class="card map-card">
                    <div class="map-card-header">
                        <div class="card-title">Field Sensor Map</div>
                        <div class="view-toggle">
                            <button class="time-btn" data-view="canvas">Canvas</button>
                            <button class="time-btn active" data-view="map">Map</button>
                        </div>
                    </div>

                    <div class="canvas-wrap" style="display:none;">
                        <canvas id="sensorMap" data-nodes="{{ nodes | tojson | e }}"></canvas>
                    </div>
                    <div id="leafletMap" class="leaflet-wrap"></div>
                </div>
            </div>

            <!-- Right column: Table + Chart -->
            <div class="col-data">
                <div class="card data-card">
                    <div class="card-title">Sensor Data</div>

                    <div class="table-scroll">
                        <table class="sensor-table">
                            <thead>
                                <tr>
                                    <th>Node ID</th>
                                    <th>Battery Level</th>
                                    <th>Moisture Level</th>
                                    <th>Temperature</th>
                                </tr>
                            </thead>
                            <tbody id="sensorTableBody">
                                {% for row in table_data %}
                                <tr>
                                    <td class="node-id">{{ row.node_id }}</td>
                                    <td>
                                        <div class="bar-cell">
                                            <div class="mini-bar">
                                                <div class="mini-bar-fill" style="width:{{ row.battery }}%; background:{{ '#68D391' if row.battery >= 70 else '#F6AD55' }};"></div>
                                            </div>
                                            <span class="bar-label">{{ row.battery }}%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="bar-cell">
                                            <div class="mini-bar">
                                                <div class="mini-bar-fill" style="width:{{ row.moisture }}%; background:{{ '#48BB78' if row.moisture >= 60 else '#ECC94B' if row.moisture >= 40 else '#ED8936' if row.moisture >= 20 else '#E53E3E' }};"></div>
                                            </div>
                                            <span class="bar-label">{{ row.moisture }}%</span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="temp-cell {{ 'high' if row.temp_high else 'normal' }}">&#x1f321; {{ row.temp }}&deg;C</span>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Historical chart -->
                <div class="card chart-card">
                    <div class="card-title">Historical Trends</div>
                    <div class="chart-wrap">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
